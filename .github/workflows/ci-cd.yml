name: MLOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Job 1: Train ─────────────────────────────────────────────────────────────
  train:
    name: Train Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install training dependencies
        run: pip install -r training/requirements.txt

      - name: Generate training data
        run: |
          cd data
          python generate_data.py

      - name: Train model
        env:
          # If you have a remote MLflow server, set this secret
          # Otherwise training still runs and saves model.pkl locally
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI || 'http://localhost:5000' }}
          DATA_PATH: ../data/train.csv
          MODEL_OUTPUT_PATH: model.pkl
        run: |
          cd training
          python train.py || true
          # Fallback: train without MLflow tracking if server unreachable
          if [ ! -f model.pkl ]; then
            echo "MLflow unreachable, training with local fallback..."
            MLFLOW_TRACKING_URI=sqlite:///mlruns.db python train.py
          fi

      - name: Verify model artifact exists
        run: |
          ls -lh training/model.pkl
          echo "Model artifact ready"

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-artifact
          path: training/model.pkl
          retention-days: 7


  # ── Job 2: Build & Push Container ────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: train
    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      full_image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model-artifact
          path: serving/

      - name: Verify model in serving dir
        run: ls -lh serving/model.pkl

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./serving
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ── Job 3: Deploy to K3s via self-hosted runner ───────────────────────────────
  # The self-hosted runner runs inside WSL2 and has direct kubectl access
  # to your local K3s cluster — no kubeconfig secret needed
  deploy:
    name: Deploy to K3s
    runs-on: self-hosted        # <-- runs on YOUR machine in WSL2
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify kubectl can reach K3s
        run: kubectl get nodes

      - name: Ensure mlops namespace exists
        run: kubectl apply -f k8s/service.yaml

      - name: Inject image tag into deployment manifest
        run: |
          # Extract the short SHA tag from the full image list
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          GITHUB_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          FULL_IMAGE="${{ env.REGISTRY }}/${GITHUB_OWNER}/${{ github.event.repository.name }}:${IMAGE_TAG}"

          echo "Deploying image: $FULL_IMAGE"

          # Replace placeholders in deployment manifest
          sed -i "s|ghcr.io/utkarshp845/mlops-k3s:IMAGE_TAG|${FULL_IMAGE}|g" k8s/deployment.yaml

          # Show the final manifest for debugging
          cat k8s/deployment.yaml

      - name: Create GHCR pull secret in K3s
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace=mlops \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply deployment
        run: kubectl apply -f k8s/deployment.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/iris-classifier \
            -n mlops \
            --timeout=120s

      - name: Verify deployment
        run: |
          echo "=== Pods ==="
          kubectl get pods -n mlops

          echo "=== Services ==="
          kubectl get svc -n mlops

          echo "=== Recent events ==="
          kubectl get events -n mlops --sort-by='.lastTimestamp' | tail -10